name: Deploy

on:
  workflow_run:
    workflows: ["Build & Push to GHCR"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}:latest

jobs:
  deploy:
    runs-on: kimlab
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_SERVER }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy compose file to server
        run: |
          scp -i ~/.ssh/deploy_key docker-compose.prod.yml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_SERVER }}:/srv/ow-course-designer/

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_SERVER }} "
            cd /srv/ow-course-designer
            mkdir -p /var/lib/ow-course-designer/flyovers
            mkdir -p /var/log/ow-course-designer
            podman pull ${{ env.IMAGE }}
            podman compose -f docker-compose.prod.yml up -d --remove-orphans
            podman image prune -f
          "

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
