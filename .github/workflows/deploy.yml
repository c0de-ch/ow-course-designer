name: Deploy

on:
  workflow_run:
    workflows: ["Build & Push to GHCR"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}:latest

jobs:
  deploy:
    runs-on: kimlab
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        run: |
          mkdir -p /srv/ow-course-designer
          mkdir -p /var/lib/ow-course-designer/flyovers
          mkdir -p /var/log/ow-course-designer
          cp docker-compose.prod.yml /srv/ow-course-designer/
          cd /srv/ow-course-designer
          podman pull ${{ env.IMAGE }}
          podman compose -f docker-compose.prod.yml up -d --remove-orphans
          podman image prune -f
