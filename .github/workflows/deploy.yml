name: Deploy

on:
  workflow_run:
    workflows: ["Build & Push to GHCR"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}

# Serialize deploys so overlapping merges don't race to retag :latest.
# Cancel any queued-but-not-started run so the newest commit wins.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: kimlab
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Resolve commit SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FULL_SHA="${{ github.sha }}"
          else
            FULL_SHA="${{ github.event.workflow_run.head_sha }}"
          fi
          SHORT_SHA=$(echo "$FULL_SHA" | cut -c1-7)
          echo "full=$FULL_SHA" >> "$GITHUB_OUTPUT"
          echo "short=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY_IMAGE}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      # Check out the commit that was actually built so the compose file
      # we ship matches the image version we're about to deploy.
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.full }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_SERVER }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy compose file to server
        run: |
          scp -i ~/.ssh/deploy_key docker-compose.prod.yml \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_SERVER }}:/srv/ow-course-designer/

      - name: Deploy
        env:
          IMAGE: ${{ steps.sha.outputs.image }}
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_SERVER }} \
            "set -euo pipefail; \
             cd /srv/ow-course-designer && \
             mkdir -p /var/lib/ow-course-designer/flyovers /var/log/ow-course-designer && \
             podman pull '${IMAGE}' && \
             podman tag '${IMAGE}' '${{ env.REGISTRY_IMAGE }}:latest' && \
             OW_IMAGE='${IMAGE}' podman compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans && \
             podman image prune -f"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
